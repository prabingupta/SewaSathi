{% extends 'base.html' %}
{% block title %}Login - SewaSaathi{% endblock %}

{% block content %}
<div class="ss-auth-wrap">
    <div class="ss-auth-card">
        <div class="ss-card">
            <span class="ss-eyebrow text-center d-block mb-2" style="color: var(--ss-terracotta-dark);">Welcome back</span>
            <h2 class="text-center mb-4">Login to your account</h2>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="ss-label">Username</label>
                    <input type="text" name="username" class="ss-form-control" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="ss-label">Password</label>
                    <input type="password" name="password" class="ss-form-control" required>
                </div>

                {% if form.errors %}
                    <div class="ss-field-error mb-3">
                        Invalid username or password. Please try again.
                    </div>
                {% endif %}

                <button type="submit" class="btn btn-ss-primary w-100 mt-2">Login</button>
            </form>

            <div class="ss-divider-label">New to SewaSaathi?</div>
            <a href="{% url 'register' %}" class="btn btn-ss-outline w-100">Create an account</a>
        </div>
    </div>
</div>
{% endblock %}
